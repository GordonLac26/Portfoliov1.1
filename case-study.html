    // ─── POPULATE PAGE FROM ?case= PARAM ───
    function loadCase() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('case') || 'brand-identity';
      const data = cases[id];
      if (!data) return;

      // Page title
      document.title = 'Gordon Lac — ' + data.title;

      // Case title
      document.getElementById('case-title').textContent = data.title;

      // Meta row
      document.getElementById('case-meta').innerHTML = data.meta.map(m => `
        <div class="case-meta-item">
          <p class="case-meta-label">${m.label}</p>
          <p class="case-meta-value">${m.value}</p>
        </div>
      `).join('');

      // Cover image
      const cover = document.getElementById('case-cover');
      if (data.coverImg) {
        cover.innerHTML = `<img src="${data.coverImg}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
      } else {
        cover.textContent = data.coverLabel || 'Project Image';
      }

      // Sidebar
      document.getElementById('case-overview').textContent = data.overview;
      document.getElementById('case-roles').innerHTML = data.roles.map(r => `<span class="case-sidebar-tag">${r}</span>`).join('');
      document.getElementById('case-tools').innerHTML = data.tools.map(t => `<span class="case-sidebar-tag">${t}</span>`).join('');

      // ─── Content sections (each section now has its OWN image) ───
      document.getElementById('case-content').innerHTML = data.sections.map(s => `
        <div class="case-section">
          <p class="case-section-label">${s.label}</p>
          <h2 class="case-section-title">${s.title}</h2>
          <p class="case-section-body">${s.body}</p>
          <div class="case-img-full">
            ${s.sectionImg
              ? `<img src="${s.sectionImg}" style="width:100%;height:100%;object-fit:cover;display:block;">`
              : ''
            }
          </div>
        </div>
      `).join('');

      // Next project
      document.getElementById('case-next-title').textContent = data.nextTitle;
      document.getElementById('case-next').onclick = () => {
        window.location.href = 'case-study.html?case=' + data.nextCase;
      };
    }

    initCursor();
    initNavScroll();
    loadCase();
    initReveal(document);
  </script>
</body>
