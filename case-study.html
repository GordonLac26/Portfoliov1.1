  <style>
    /* ── Gallery Grid ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 2rem;
    }

    .gallery-item {
      aspect-ratio: 3/2;
      overflow: hidden;
      cursor: pointer;
      border-radius: 4px;
      transform: scale(1);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  box-shadow 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .gallery-item:hover {
      transform: scale(1.04) translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.28);
      z-index: 2;
      position: relative;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .gallery-item:hover img {
      transform: scale(1.06);
    }

    /* ── Lightbox Overlay ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #lightbox.active {
      display: flex;
      opacity: 1;
    }

    #lightbox-img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      transform: scale(0.92);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #lightbox.active #lightbox-img {
      transform: scale(1);
    }

    /* ── Lightbox Nav Arrows ── */
    .lightbox-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 1.4rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      user-select: none;
    }

    .lightbox-arrow:hover {
      background: rgba(255,255,255,0.22);
      transform: translateY(-50%) scale(1.1);
    }

    #lightbox-prev { left: 24px; }
    #lightbox-next { right: 24px; }

    /* ── Lightbox Close ── */
    #lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 1.2rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    #lightbox-close:hover {
      background: rgba(255,255,255,0.22);
      transform: scale(1.1);
    }

    /* ── Lightbox Counter ── */
    #lightbox-counter {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.55);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }
  </style>

    // ─── LIGHTBOX STATE ───
    let lightboxImages = [];
    let lightboxIndex  = 0;

    function openLightbox(imgs, index) {
      lightboxImages = imgs;
      lightboxIndex  = index;
      renderLightbox();
      const lb = document.getElementById('lightbox');
      lb.style.display = 'flex';
      // small delay so the transition fires
      requestAnimationFrame(() => {
        requestAnimationFrame(() => lb.classList.add('active'));
      });
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const lb = document.getElementById('lightbox');
      lb.classList.remove('active');
      setTimeout(() => {
        lb.style.display = 'none';
        document.body.style.overflow = '';
      }, 300);
    }

    function renderLightbox() {
      document.getElementById('lightbox-img').src = lightboxImages[lightboxIndex];
      document.getElementById('lightbox-counter').textContent =
        (lightboxIndex + 1) + ' / ' + lightboxImages.length;
    }

    function lightboxPrev() {
      lightboxIndex = (lightboxIndex - 1 + lightboxImages.length) % lightboxImages.length;
      renderLightbox();
    }

    function lightboxNext() {
      lightboxIndex = (lightboxIndex + 1) % lightboxImages.length;
      renderLightbox();
    }

    // ─── CLOSE on overlay click ───
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });
    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', lightboxPrev);
    document.getElementById('lightbox-next').addEventListener('click', lightboxNext);

    // ─── KEYBOARD nav ───
    document.addEventListener('keydown', function(e) {
      if (document.getElementById('lightbox').classList.contains('active')) {
        if (e.key === 'ArrowLeft')  lightboxPrev();
        if (e.key === 'ArrowRight') lightboxNext();
        if (e.key === 'Escape')     closeLightbox();
      }
    });

    // ─── POPULATE PAGE FROM ?case= PARAM ───
    function loadCase() {
      const params = new URLSearchParams(window.location.search);
      const id     = params.get('case') || 'brand-identity';
      const data   = cases[id];
      if (!data) return;

      document.title = 'Gordon Lac — ' + data.title;
      document.getElementById('case-title').textContent = data.title;

      document.getElementById('case-meta').innerHTML = data.meta.map(m => `
        <div class="case-meta-item">
          <p class="case-meta-label">${m.label}</p>
          <p class="case-meta-value">${m.value}</p>
        </div>
      `).join('');

      const cover = document.getElementById('case-cover');
      if (data.coverImg) {
        cover.innerHTML = `<img src="${data.coverImg}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
      } else {
        cover.textContent = data.coverLabel || 'Project Image';
      }

      document.getElementById('case-overview').textContent = data.overview;
      document.getElementById('case-roles').innerHTML  = data.roles.map(r => `<span class="case-sidebar-tag">${r}</span>`).join('');
      document.getElementById('case-tools').innerHTML  = data.tools.map(t => `<span class="case-sidebar-tag">${t}</span>`).join('');

      // ✅ CHANGED — render logic handles galleryImgs array with hover + lightbox
      document.getElementById('case-content').innerHTML = data.sections.map((s, si) => `
        <div class="case-section">
          <p class="case-section-label">${s.label}</p>
          <h2 class="case-section-title">${s.title}</h2>
          <p class="case-section-body">${s.body}</p>

          ${s.galleryImgs
            ? `<div class="gallery-grid">
                ${s.galleryImgs.map((img, i) => `
                  <div class="gallery-item" data-section="${si}" data-index="${i}">
                    <img src="${img}" alt="Gallery image ${i + 1}">
                  </div>
                `).join('')}
              </div>`
            : s.sectionImg
              ? `<div class="case-img-full">
                   <img src="${s.sectionImg}" style="width:100%;height:100%;object-fit:cover;display:block;">
                 </div>`
              : ''
          }
        </div>
      `).join('');

      // ─── Attach lightbox click listeners after render ───
      document.querySelectorAll('.gallery-item').forEach(item => {
        item.addEventListener('click', function() {
          const si    = parseInt(this.dataset.section);
          const index = parseInt(this.dataset.index);
          const imgs  = data.sections[si].galleryImgs;
          openLightbox(imgs, index);
        });
      });

      document.getElementById('case-next-title').textContent = data.nextTitle;
      document.getElementById('case-next').onclick = () => {
        window.location.href = 'case-study.html?case=' + data.nextCase;
      };
    }

    initCursor();
    initNavScroll();
    loadCase();
    initReveal(document);
  </script>
